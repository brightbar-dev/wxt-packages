name: Publish

on:
  push:
    tags: ['wxt-extpay@*']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npx vitest run
        working-directory: packages/wxt-extpay

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        working-directory: packages/wxt-extpay
      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/wxt-extpay
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
